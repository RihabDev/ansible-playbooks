---
- name: Configure VM — hardening and monitoring
  hosts: newly_provisioned
  gather_facts: true
  become: yes

  vars:
    ansible_host: "{{ vm_ip }}"
    ansible_user: "{{ new_user }}"         
    ansible_password: "{{ new_user_password }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

  roles:
    - role: hardening
    - role: node_exporter
