---
- name: Play 1 - Provision VM via Satellite
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Get compute resource ID
      uri:
        url: "https://satellite.local/api/compute_resources?search=name%3DKVM-local"
        method: GET
        user: "admin"
        password: "123456"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: cr_result

    - name: Set compute resource ID
      set_fact:
        cr_id: "{{ cr_result.json.results[0].id }}"

    - name: Get hostgroup ID
      uri:
        url: "https://satellite.local/api/hostgroups?search=name%3DRHEL9-Group"
        method: GET
        user: "admin"
        password: "123456"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: hg_result

    - name: Set hostgroup ID
      set_fact:
        hg_id: "{{ hg_result.json.results[0].id }}"

    - name: Get location ID
      uri:
        url: "https://satellite.local/api/locations?search=name%3DTunis"
        method: GET
        user: "admin"
        password: "123456"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: loc_result

    - name: Set location ID
      set_fact:
        loc_id: "{{ loc_result.json.results[0].id }}"

    - name: Get organization ID
      uri:
        url: "https://satellite.local/api/organizations?search=name%3DLinsoft"
        method: GET
        user: "admin"
        password: "123456"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: org_result

    - name: Set organization ID
      set_fact:
        org_id: "{{ org_result.json.results[0].id }}"

    - name: Get compute profile ID
      uri:
        url: "https://satellite.local/api/compute_profiles?search=name%3Dsatellite-vm"
        method: GET
        user: "admin"
        password: "123456"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: cp_result

    - name: Set compute profile ID
      set_fact:
        cp_id: "{{ cp_result.json.results[0].id }}"

    - name: Create and provision VM via Satellite API
      uri:
        url: "https://satellite.local/api/hosts"
        method: POST
        user: "admin"
        password: "123456"
        validate_certs: false
        force_basic_auth: yes
        status_code: 201
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          host:
            name: "{{ vm_name }}"
            organization_id: "{{ org_id }}"
            location_id: "{{ loc_id }}"
            hostgroup_id: "{{ hg_id }}"
            compute_resource_id: "{{ cr_id }}"
            compute_profile_id: "{{ cp_id }}"
            root_pass: "12345678"
            build: true
            ip: "{{ vm_ip }}"

    - name: Wait for VM to come online
      wait_for:
        host: "{{ vm_ip }}"
        port: 22
        delay: 60
        timeout: 600
        state: started

    - name: Add new VM to in-memory inventory
      add_host:
        name: "{{ vm_name }}"
        ansible_host: "{{ vm_ip }}"
        ansible_user: root
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
        groups: newly_provisioned

- name: Play 2 - Configure new VM
  hosts: newly_provisioned
  gather_facts: true
  become: yes
  roles:
    - role: rhsm_register
    - role: hardening
    - role: node_exporter
