---
- name: Play 1 - Provision VM via Satellite (Semi-Dynamic IP)
  hosts: localhost
  gather_facts: false

  vars_files:
    - vars.yml

  tasks:

    - name: Get compute resource ID
      uri:
        url: "{{ satellite_url }}/api/compute_resources?search=name%3DKVM-local"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: cr_result

    - name: Set compute resource ID
      set_fact:
        cr_id: "{{ cr_result.json.results[0].id }}"

    - name: Get hostgroup ID
      uri:
        url: "{{ satellite_url }}/api/hostgroups?search=name%3DRHEL9-Group"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: hg_result

    - name: Set hostgroup ID
      set_fact:
        hg_id: "{{ hg_result.json.results[0].id }}"

    - name: Get location ID
      uri:
        url: "{{ satellite_url }}/api/locations?search=name%3DTunis"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: loc_result

    - name: Set location ID
      set_fact:
        loc_id: "{{ loc_result.json.results[0].id }}"

    - name: Get organization ID
      uri:
        url: "{{ satellite_url }}/api/organizations?search=name%3DLinsoft"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: org_result

    - name: Set organization ID
      set_fact:
        org_id: "{{ org_result.json.results[0].id }}"

    - name: Get compute profile ID
      uri:
        url: "{{ satellite_url }}/api/compute_profiles?search=name%3Dsatellite-vm"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: cp_result

    - name: Set compute profile ID
      set_fact:
        cp_id: "{{ cp_result.json.results[0].id }}"

    - name: Get subnet ID
      uri:
        url: "{{ satellite_url }}/api/subnets?search=name%3Dsatellite-network"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: sn_result

    - name: Set subnet ID
      set_fact:
        sn_id: "{{ sn_result.json.results[0].id }}"

    - name: Get domain ID
      uri:
        url: "{{ satellite_url }}/api/domains?search=name%3Dlocal"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: domain_result

    - name: Set domain ID
      set_fact:
        domain_id: "{{ domain_result.json.results[0].id }}"

    - name: Get subnet details
      uri:
        url: "{{ satellite_url }}/api/subnets/{{ sn_id }}"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: subnet_details

    - name: Get all existing hosts in subnet
      uri:
        url: "{{ satellite_url }}/api/hosts?search=subnet_id%3D{{ sn_id }}"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: existing_hosts

    - name: Generate candidate IP list (.120-.200)
      set_fact:
        candidate_ips: >-
          {{
            query('ansible.builtin.sequence', 'start=120 end=200')
            | map('regex_replace',
                  '^',
                  subnet_details.json.network.split('.')[0] ~ '.' ~
                  subnet_details.json.network.split('.')[1] ~ '.' ~
                  subnet_details.json.network.split('.')[2] ~ '.')
            | list
          }}

    - name: Extract used IP addresses
      set_fact:
        used_ips: "{{ existing_hosts.json.results | map(attribute='ip') | list }}"

    - name: Find first available IP
      set_fact:
        vm_ip: "{{ (candidate_ips | difference(used_ips)) | first }}"

    - name: Fail if no IP available
      fail:
        msg: "No available IP found in range 120-200"
      when: vm_ip is not defined

    - name: Debug - Show selected IP
      debug:
        msg: "Using IP address: {{ vm_ip }}"

    - name: Create and provision VM
      uri:
        url: "{{ satellite_url }}/api/hosts"
        method: POST
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        status_code: 201
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          host:
            name: "{{ vm_name }}"
            organization_id: "{{ org_id }}"
            location_id: "{{ loc_id }}"
            hostgroup_id: "{{ hg_id }}"
            compute_resource_id: "{{ cr_id }}"
            compute_profile_id: "{{ cp_id }}"
            root_pass: "{{ root_password }}"
            build: true
            interfaces_attributes:
              - primary: true
                provision: true
                ip: "{{ vm_ip }}"
                subnet_id: "{{ sn_id }}"
                domain_id: "{{ domain_id }}"
      register: provision_result

    - name: Verify VM creation
      debug:
        msg:
          - "VM provisioned successfully!"
          - "VM Name: {{ provision_result.json.host.name }}"
          - "Assigned IP: {{ vm_ip }}"

    - name: Wait for VM SSH
      wait_for:
        host: "{{ vm_ip }}"
        port: 22
        delay: 60
        timeout: 6000
        state: started

    - name: Add VM to inventory
      add_host:
        name: "{{ vm_name }}"
        ansible_host: "{{ vm_ip }}"
        ansible_user: root
        ansible_password: "{{ root_password }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
        groups: newly_provisioned


- name: Play 2 - Configure new VM
  hosts: newly_provisioned
  gather_facts: true
  become: yes

  roles:
    - rhsm_register
    - hardening
    - node_exporter
