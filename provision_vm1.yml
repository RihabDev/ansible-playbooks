---
- name: Play 1 - Provision VM via Satellite (Semi-Dynamic IP)
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars.yml
  
  tasks:
    - name: Get compute resource ID
      uri:
        url: "{{ satellite_url }}/api/compute_resources?search=name%3D{{ compute_resource_name | urlencode }}"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: cr_result

    - name: Set compute resource ID
      set_fact:
        cr_id: "{{ cr_result.json.results[0].id }}"

    - name: Get hostgroup ID
      uri:
        url: "{{ satellite_url }}/api/hostgroups?search=name%3D{{ hostgroup_name | urlencode }}"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: hg_result

    - name: Set hostgroup ID
      set_fact:
        hg_id: "{{ hg_result.json.results[0].id }}"

    - name: Get location ID
      uri:
        url: "{{ satellite_url }}/api/locations?search=name%3D{{ location_name | urlencode }}"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: loc_result

    - name: Set location ID
      set_fact:
        loc_id: "{{ loc_result.json.results[0].id }}"

    - name: Get organization ID
      uri:
        url: "{{ satellite_url }}/api/organizations?search=name%3D{{ organization_name | urlencode }}"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: org_result

    - name: Set organization ID
      set_fact:
        org_id: "{{ org_result.json.results[0].id }}"

    - name: Get compute profile ID
      uri:
        url: "{{ satellite_url }}/api/compute_profiles?search=name%3D{{ compute_profile_name | urlencode }}"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: cp_result

    - name: Set compute profile ID
      set_fact:
        cp_id: "{{ cp_result.json.results[0].id }}"

    - name: Get subnet ID
      uri:
        url: "{{ satellite_url }}/api/subnets?search=name%3D{{ subnet_name | urlencode }}"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: sn_result

    - name: Set subnet ID
      set_fact:
        sn_id: "{{ sn_result.json.results[0].id }}"

    - name: Get subnet details (to find available IP range)
      uri:
        url: "{{ satellite_url }}/api/subnets/{{ sn_id }}"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: subnet_details

    - name: Get all existing hosts in the subnet
      uri:
        url: "{{ satellite_url }}/api/hosts?search=subnet_id%3D{{ sn_id }}"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
      register: existing_hosts

    - name: Find an available IP address
      set_fact:
        vm_ip: "{{ lookup('ansible.builtin.sequence', 'start=120 end=200', '{{ subnet_details.json.network }}') | map('ipaddr', subnet_details.json.netmask) | select('search', subnet_details.json.network) | difference(existing_hosts.json.results | map(attribute='ip')) | first }}"
      vars:
        subnet_network: "{{ subnet_details.json.network | ansible.builtin.ipaddr('network') }}"
        subnet_prefix: "{{ subnet_details.json.netmask | ansible.builtin.ipaddr('prefix') }}"

    - name: Debug - Show selected IP
      debug:
        msg: "Using IP address: {{ vm_ip }}"

    - name: Create and provision VM with the available IP
      uri:
        url: "{{ satellite_url }}/api/hosts"
        method: POST
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        status_code: 201
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          host:
            name: "{{ vm_name }}"
            organization_id: "{{ org_id }}"
            location_id: "{{ loc_id }}"
            hostgroup_id: "{{ hg_id }}"
            compute_resource_id: "{{ cr_id }}"
            compute_profile_id: "{{ cp_id }}"
            root_pass: "{{ root_password }}"
            build: true
            interfaces_attributes:
              - primary: true
                provision: true
                ip: "{{ vm_ip }}"
                subnet_id: "{{ sn_id }}"
                domain_id: "{{ domain_id }}"
      register: provision_result

    - name: Verify VM was created with correct IP
      debug:
        msg: 
          - "VM provisioned successfully!"
          - "VM Name: {{ provision_result.json.host.name }}"
          - "Assigned IP: {{ provision_result.json.host.ip }}"

    - name: Wait for VM to be ready on SSH port
      wait_for:
        host: "{{ vm_ip }}"
        port: 22
        delay: "{{ wait_delay }}"
        timeout: "{{ wait_timeout }}"
        state: started

    - name: Add VM to inventory
      add_host:
        name: "{{ vm_name }}"
        ansible_host: "{{ vm_ip }}"
        ansible_user: root
        ansible_password: "{{ root_password }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
        groups: newly_provisioned

- name: Play 2 - Configure the new VM
  hosts: newly_provisioned
  gather_facts: true
  become: yes
  vars_files:
    - vars.yml
  
  tasks:
    - name: Test connection
      ping:

    - name: Show VM details
      debug:
        msg:
          - "Successfully connected to {{ ansible_hostname }}"
          - "IP Address: {{ ansible_default_ipv4.address }}"
