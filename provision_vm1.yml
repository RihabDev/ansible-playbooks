---
- name: Play 1 - Provision VM via Satellite
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create and provision VM via Satellite API
      uri:
        url: "https://satellite.local/api/hosts"
        method: POST
        user: "admin"
        password: "123456"
        validate_certs: false
        force_basic_auth: yes
        status_code: 201
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          host:
            name: "{{ vm_name }}"
            organization: "linsoft"
            location: "Tunis"
            hostgroup: "RHEL9-Group"
            compute_resource: "KVM-local"
            compute_profile: "satellite-vm"
            root_pass: "12345678"
            build: true
            ip: "{{ vm_ip }}"

    - name: Wait for VM to come online
      wait_for:
        host: "{{ vm_ip }}"
        port: 22
        delay: 60
        timeout: 600
        state: started

    - name: Add new VM to in-memory inventory
      add_host:
        name: "{{ vm_name }}"
        ansible_host: "{{ vm_ip }}"
        ansible_user: root
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
        groups: newly_provisioned

- name: Play 2 - Configure new VM
  hosts: newly_provisioned
  gather_facts: true
  become: yes
  roles:
    - role: rhsm_register
    - role: hardening
    - role: node_exporter
