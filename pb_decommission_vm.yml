---
- name: Decommission VM
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Get host ID from Satellite
      uri:
        url: "{{ satellite_url }}/api/hosts?search=name%3D{{ vm_name | lower }}.local"
        method: GET
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
      register: host_lookup

    - name: Remove VM from Satellite
      uri:
        url: "{{ satellite_url }}/api/hosts/{{ host_lookup.json.results[0].id }}"
        method: DELETE
        user: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        force_basic_auth: yes
        status_code: 200
        
    - name: Destroy VM on KVM (power off)
      delegate_to: "{{ kvm_host }}"
      command: "virsh destroy {{ vm_name | lower }}.local"
      ignore_errors: yes

    - name: Undefine VM on KVM
      delegate_to: "{{ kvm_host }}"
      command: "virsh undefine {{ vm_name | lower }}.local"
      ignore_errors: yes

    - name: Delete VM disk volume on KVM
      delegate_to: "{{ kvm_host }}"
      command: "virsh vol-delete {{ vm_name | lower }}.local-disk1 --pool default"
      ignore_errors: yes
    - name: Remove Prometheus scrape target file
      delegate_to: "{{ prometheus_server }}"
      become: yes
      file:
        path: "/etc/prometheus/targets/{{ vm_name | lower }}.local.yml"
        state: absent

    - name: Reload Prometheus to apply changes
      delegate_to: "{{ prometheus_server }}"
      become: yes
      systemd:
        name: prometheus
        state: reloaded
        state: reloaded
