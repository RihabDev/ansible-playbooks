---
- name: Install Satellite Katello CA certificate
  dnf:
    name: "http://{{ rhsm_satellite_fqdn }}/pub/katello-ca-consumer-latest.noarch.rpm"
    state: present
    disable_gpg_check: yes

- name: Clean any previous RHSM state
  command: subscription-manager clean
  changed_when: false

- name: Register with Satellite using activation key
  command: >
    subscription-manager register
    --org="{{ rhsm_org }}"
    --activationkey="{{ rhsm_activationkey }}"
    --serverurl="https://{{ rhsm_satellite_fqdn }}"
    --force
  register: rhsm_register_result
  changed_when: "'system has been registered' in rhsm_register_result.stdout | lower"
  failed_when: rhsm_register_result.rc != 0

- name: Verify registration status
  command: subscription-manager status
  register: rhsm_status
  changed_when: false
  ignore_errors: yes

- name: Show registration status
  debug:
    msg: "{{ rhsm_status.stdout }}"

- name: Enable katello-agent for Satellite remote execution
  dnf:
    name: katello-agent
    state: present

- name: Start and enable goferd
  systemd:
    name: goferd
    state: started
    enabled: yes
