---
- name: Provision VM via Satellite
  hosts: localhost
  gather_facts: false
  collections:
    - theforeman.foreman

  tasks:
    - name: Create and provision VM
      theforeman.foreman.host:
        server_url: "{{ satellite_url }}"
        username: "{{ satellite_user }}"
        password: "{{ satellite_password }}"
        validate_certs: false
        name: "{{ vm_name }}"
        organization: "{{ organization }}"
        location: "{{ location }}"
        hostgroup: "{{ hostgroup }}"
        compute_resource: "{{ compute_resource }}"
        root_pass: "{{ root_pass }}"
        openscap_proxy: "{{ openscap_capsule }}"
        ptable: "Kickstart default"   
        pxe_loader: "PXELinux BIOS"
        build: true
        state: present
        interfaces_attributes:
          - primary: true
            provision: true
            ip: "{{ vm_ip }}"
            subnet: "{{ subnet }}"
            domain: "{{ domain }}"
        compute_attributes:
            cpus: 2
            memory: 4194304                     
            disk_capacity: "20G"
            disk_allocation: "2G"
            
     
