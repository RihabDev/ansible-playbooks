---
- name: Provision VM via Satellite
  hosts: localhost
  gather_facts: false
  collections:
    - theforeman.foreman

  tasks:
    - name: Create and provision VM
      theforeman.foreman.host:
        server_url: "{{ foreman_server_url }}"
        username: "{{ foreman_username }}"
        password: "{{ foreman_password }}"
        validate_certs: false
        name: "{{ vm_name }}"
        organization: "{{ organization }}"
        location: "{{ location }}"
        hostgroup: "{{ hostgroup }}"
        compute_resource: "{{ compute_resource }}"
        root_pass: "{{ root_pass }}"
        build: true
        state: present
        interfaces_attributes:
          - primary: true
            provision: true
            ip: "{{ vm_ip }}"
            mac: ""
            subnet: "{{ subnet }}"
            domain: "{{ domain }}"
